openapi: 3.1.0
info:
  title: TaskGid API
  description: API documentation for TaskGid - Task Management Application
  version: 1.0.0
  contact:
    name: realabdullah
  license:
    name: ISC
servers:
  - url: http://localhost:8000
    description: Development server
  - url: https://taskgidapi.abdspace.xyz
    description: Production server (example)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        success:
          type: boolean
          default: false

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        username:
          type: string
        profilePicture:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        about:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkspaceActivity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        action:
          type: string
          enum:
            [
              workspace_created,
              workspace_updated,
              workspace_deleted,
              member_invited,
              member_joined,
              member_removed,
              member_promoted,
              member_demoted,
              task_created,
              task_updated,
              task_deleted,
              task_assigned,
              task_unassigned,
            ]
        details:
          type: object
          nullable: true
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the task.
          example: "uuid-task-123"
        title:
          type: string
          description: The title of the task.
          example: "Implement Authentication"
        description:
          type: string
          nullable: true
          description: Detailed description of the task.
          example: "Set up JWT authentication using Passport.js"
        status:
          type: string
          enum: [ todo, in_progress, done ]
          description: Current status of the task.
          example: "todo"
        priority:
          type: string
          enum: [ low, medium, high ]
          description: Priority level of the task.
          example: "high"
        dueDate:
          type: string
          format: date-time
          nullable: true
          description: The date when the task is due.
          example: "2025-07-01T00:00:00.000Z"
        workspaceId:
          type: string
          format: uuid
          description: ID of the workspace this task belongs to.
          example: "uuid-workspace-1"
        createdById:
          type: string
          format: uuid
          description: ID of the user who created the task.
          example: "uuid-user-creator"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the task was created.
          example: "2025-05-04T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the task was last updated.
          example: "2025-05-04T11:30:00.000Z"
        assignees:
          type: array
          items:
            $ref: '#/components/schemas/User'
          description: List of users assigned to the task.
        creator:
          $ref: '#/components/schemas/User'
          description: The user who created the task.

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        taskId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        originalname:
          type: string
        mimetype:
          type: string
        size:
          type: integer
        path:
          type: string
        url:
          type: string
        storageType:
          type: string
        userId:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
          nullable: true
        commentId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Statistics:
      type: object
      properties:
        tasksByStatus:
          type: object
          properties:
            todo:
              type: integer
            in_progress:
              type: integer
            done:
              type: integer
        tasksByPriority:
          type: object
          properties:
            low:
              type: integer
            medium:
              type: integer
            high:
              type: integer
        completionRate:
          type: number
          format: float
        teamMemberCount:
          type: integer

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: object
          properties:
            token:
              type: string
            expires:
              type: string
              format: date-time
        refreshToken:
          type: object
          properties:
            token:
              type: string

    Pagination:
      type: object
      properties:
        currentPage:
          type: integer
          format: int32
          description: The current page number.
          example: 1
        totalPages:
          type: integer
          format: int32
          description: The total number of pages available.
          example: 5
        pageSize:
          type: integer
          format: int32
          description: The number of items per page.
          example: 10
        totalCount:
          type: integer
          format: int64
          description: The total number of items matching the query.
          example: 48
        hasNextPage:
          type: boolean
          description: Indicates if there is a next page.
          example: true
        hasPreviousPage:
          type: boolean
          description: Indicates if there is a previous page.
          example: false

    PaginatedTasksResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Tasks fetched successfully"
        data:
          type: object
          properties:
            tasks:
              type: array
              items:
                $ref: '#/components/schemas/Task'
            pagination:
              $ref: '#/components/schemas/Pagination'

    ErrorResponse:
        type: object
        properties:
          status:
            type: string
            example: "error"
          message:
            type: string
            description: A description of the error that occurred.
            example: "Resource not found."


paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
                - username
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
                username:
                  type: string
                  pattern: ^[a-zA-Z0-9_]+$
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  accessToken:
                    type: object
                    properties:
                      token:
                        type: string
                      expiresIn:
                        type: integer
                  success:
                    type: boolean
                    default: true
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      summary: Login with email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  accessToken:
                    type: object
                    properties:
                      token:
                        type: string
                      expires:
                        type: string
                  refreshToken:
                    type: object
                    properties:
                      token:
                        type: string
                  success:
                    type: boolean
                    default: true
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      summary: Logout user
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                    default: true
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: object
                    properties:
                      token:
                        type: string
                      expiresIn:
                        type: integer
                  success:
                    type: boolean
                    default: true
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/authn/request-login:
    post:
      summary: Request WebAuthn login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: WebAuthn options generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    type: object
                  success:
                    type: boolean
                    default: true
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/authn/login:
    post:
      summary: Complete WebAuthn login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  accessToken:
                    type: object
                    properties:
                      token:
                        type: string
                      expires:
                        type: string
                  success:
                    type: boolean
                    default: true
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/authn/register:
    post:
      summary: Register a new WebAuthn credential
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        "200":
          description: WebAuthn registration options generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    type: object
                  success:
                    type: boolean
                    default: true
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/authn/verify-registration:
    post:
      summary: Verify WebAuthn registration
      tags:
        - Authentication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credential
              properties:
                credential:
                  type: object
      responses:
        "200":
          description: WebAuthn credential registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                    default: true
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users:
    get:
      summary: Get current user profile
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  success:
                    type: boolean
                    default: true
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/profile:
    get:
      summary: Get detailed user profile
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: "#/components/schemas/User"
                  success:
                    type: boolean
                    default: true
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update user profile
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                title:
                  type: string
                about:
                  type: string
                location:
                  type: string
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  success:
                    type: boolean
                    default: true
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/profile/picture:
    post:
      summary: Upload profile picture
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Profile picture uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  profilePicture:
                    type: string
                  success:
                    type: boolean
                    default: true
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspaces:
    get:
      summary: Get all workspaces for current user
      tags:
        - Workspaces
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Workspaces retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workspace"
                  success:
                    type: boolean
                    default: true
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new workspace
      tags:
        - Workspaces
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Workspace created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
                  success:
                    type: boolean
                    default: true
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspaces/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get workspace by slug
      tags:
        - Workspaces
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Workspace retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update workspace
      tags:
        - Workspaces
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Workspace updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete workspace
      tags:
        - Workspaces
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Workspace deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspaces/{slug}/team:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get workspace team members
      tags:
        - Teams
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Team members retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Add team member to workspace
      tags:
        - Teams
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [member, admin]
                  default: member
      responses:
        "200":
          description: Team member added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspaces/{slug}/team/{userIdToRemove}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: userIdToRemove
        in: path
        required: true
        schema:
          type: string
          format: uuid

    delete:
      summary: Remove team member from workspace
      tags:
        - Teams
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Team member removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspaces/{slug}/admins/{userId}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      summary: Promote user to workspace admin
      tags:
        - Teams
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User promoted to admin successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Demote user from workspace admin
      tags:
        - Teams
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User demoted from admin successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspaces/{slug}/statistics:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get workspace statistics
      tags:
        - Statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  statistics:
                    $ref: "#/components/schemas/Statistics"
                  success:
                    type: boolean
                    default: true
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspaces/{slug}/activities:
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string

      get:
        summary: Get workspace activity logs
        tags:
          - Workspaces
        security:
          - bearerAuth: []
        parameters:
          - name: page
            in: query
            schema:
              type: integer
              default: 1
          - name: limit
            in: query
            schema:
              type: integer
              default: 10
        responses:
          "200":
            description: Activity logs retrieved successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    activities:
                      type: array
                      items:
                        $ref: "#/components/schemas/WorkspaceActivity"
                    pagination:
                      type: object
                      properties:
                        totalItems:
                          type: integer
                        totalPages:
                          type: integer
                        currentPage:
                          type: integer
                        itemsPerPage:
                          type: integer
                    success:
                      type: boolean
                      default: true
          "403":
            description: Access denied
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
          "404":
            description: Workspace not found
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"

  /workspaces/{workspaceSlug}/tasks:
    get:
      tags:
        - Tasks
      summary: Fetch tasks for a specific workspace
      description: |
        Retrieves a paginated list of tasks associated with a specific workspace.
        Allows filtering by search query, status, priority, and assignee.
        Authentication is required, especially for the `assignee=me` filter.
      operationId: fetchWorkspaceTasks
      parameters:
        - name: workspaceSlug
          in: path
          required: true
          description: The unique slug of the workspace.
          schema:
            type: string
          example: awesome-project
        - name: page
          in: query
          required: false
          description: The page number for pagination.
          schema:
            type: integer
            format: int32
            default: 1
            minimum: 1
          example: 1
        - name: limit
          in: query
          required: false
          description: The maximum number of tasks to return per page.
          schema:
            type: integer
            format: int32
            default: 10
            minimum: 1
          example: 25
        - name: search
          in: query
          required: false
          description: A search term to filter tasks by title or description (case-insensitive).
          schema:
            type: string
          example: deployment
        - name: status
          in: query
          required: false
          description: |
            Filter tasks by status. Provide one or more statuses as a comma-separated list.
            Valid values: `todo`, `in_progress`, `done`.
          schema:
            type: array # OpenAPI represents CSV as an array with specific styling
            items:
              type: string
              enum: [ todo, in_progress, done ]
          style: form      # Default style for query params
          explode: false   # Implies comma-separated values for arrays (?status=todo,in_progress)
          example: todo,in_progress
        - name: priority
          in: query
          required: false
          description: |
            Filter tasks by priority. Provide one or more priorities as a comma-separated list.
            Valid values: `low`, `medium`, `high`.
          schema:
            type: array
            items:
              type: string
              enum: [ low, medium, high ]
          style: form
          explode: false
          example: high,medium
        - name: assignee
          in: query
          required: false
          description: |
            Filter tasks by assignee.
            - `me`: Tasks assigned to the authenticated user (requires authentication).
            - `unassigned`: Tasks with no assignees.
          schema:
            type: string
            enum: [ me, unassigned ]
          example: me
      security:
        - BearerAuth: [ ] # Indicates Bearer Token authentication is required
      responses:
        '200':
          description: Successfully retrieved tasks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTasksResponse'
              example:
                status: "success"
                message: "Tasks fetched successfully"
                data:
                  tasks:
                    - id: "uuid-task-1"
                      title: "Design Homepage UI"
                      description: "Create mockups for the new homepage."
                      status: "in_progress"
                      priority: "high"
                      dueDate: "2025-06-15T00:00:00.000Z"
                      workspaceId: "uuid-workspace-1"
                      createdById: "uuid-user-creator"
                      createdAt: "2025-05-01T10:00:00.000Z"
                      updatedAt: "2025-05-03T14:30:00.000Z"
                      assignees:
                        - id: "uuid-user-assignee-1"
                          username: "jdoe"
                          firstName": "Jane"
                          lastName": "Doe"
                          profilePicture": "url/to/profile.jpg"
                      creator:
                        id: "uuid-user-creator"
                        username: "asmith"
                        firstName": "Alice"
                        lastName": "Smith"
                        profilePicture": "url/to/creator_profile.jpg"
                  pagination:
                    currentPage: 1
                    totalPages: 5
                    pageSize: 10
                    totalCount": 48
                    hasNextPage": true
                    hasPreviousPage": false
        '400':
          description: Bad Request - Invalid parameters provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: "error"
                message: "Invalid status value provided."
        '401':
          description: Unauthorized - Authentication token is missing or invalid, or required for the filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: "error"
                message: "Authentication required."
        '404':
          description: Not Found - Workspace with the specified slug does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: "error"
                message: "Workspace not found."
        '500':
          description: Internal Server Error - An unexpected error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: "error"
                message: "Failed to fetch tasks"

